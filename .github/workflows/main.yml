name: Hourly SSL Cert Bank

on:
  schedule:
    - cron: '0 * * * *'   # هر ساعت
  workflow_dispatch:       # اجرای دستی

# اجازه نوشتن در محتوای ریپو با توکن پیش‌فرض
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Generate certificate bank
        run: python generate_certs.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add certs.json
          git commit -m "🔄 Hourly cert bank update" || echo "No changes to commit"
          git push
